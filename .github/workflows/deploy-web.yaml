name: Deploy Web PWA

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        run: |
          flutter build web \
            --release \
            --target=lib/main_production.dart \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Copy vercel.json to build output
        run: cp vercel.json build/web/vercel.json

      - name: Setup Vercel project link
        run: |
          mkdir -p build/web/.vercel
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > build/web/.vercel/project.json

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: build/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
